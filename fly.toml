# fly.toml
app = "visito"
primary_region = "ams"

[build]

[env]
  NODE_ENV = "production"

[mounts]
  source = "visito_data"
  destination = "/data"
  initial_size = "1gb"

[[services]]
  protocol = "tcp"
  internal_port = 3000
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
