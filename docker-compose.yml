services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - visito_data:/data
    environment:
      - DATABASE_PATH=/data/db.sqlite
      - NODE_ENV=production
    restart: unless-stopped
    command: sh -c "node scripts/migrate.mjs && node server.js"

volumes:
  visito_data:
